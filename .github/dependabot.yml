version: 2
multi-ecosystem-groups:
  repo-dependencies:
    schedule:
      interval: monthly
updates:
- package-ecosystem: github-actions
  directory: /
  patterns:
  - '*'
  multi-ecosystem-group: repo-dependencies
  cooldown:
    default-days: 14
- package-ecosystem: pip
  directory: /tools/issue_handler
  patterns:
  - '*'
  multi-ecosystem-group: repo-dependencies
  cooldown:
    default-days: 14
